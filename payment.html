<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<link rel="stylesheet" href="style.css">

<style>

.payment-container{
    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.payment-container h1{
    text-align:center;
    margin-bottom:25px;
}

.payment-container label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

.payment-container input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:8px;
}

.pay-btn{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    background:#2E7D32;
    color:white;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

.pay-btn:hover{
    background:#1B5E20;
}

.total{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
    color:#2E7D32;
    font-weight:bold;
}

@media(max-width:500px){

.payment-container{
    width:95%;
}

}

</style>

</head>

<body>

<header>

<nav>

<div class="logo">
🛒 Smart Supermarket
</div>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="cart.html">Cart</a></li>

</ul>

</nav>

</header>

<div class="payment-container">

<h1>Secure Payment</h1>

<div class="total" id="totalAmount">
Total : ₹0
</div>

<form id="paymentForm">

<label>Card Holder Name</label>

<input
type="text"
id="name"
placeholder="AK"
required>

<label>Card Number</label>

<input
type="text"
id="card"
maxlength="16"
placeholder="12341"
required>

<label>Expiry Date</label>

<input
type="month"
id="expiry"
required>

<label>CVV</label>

<input
type="password"
id="cvv"
maxlength="3"
placeholder="123"
required>

<button class="pay-btn">
Pay Now
</button>

</form>

</div>

<script src="payment.js"></script>

</body>
</html>
