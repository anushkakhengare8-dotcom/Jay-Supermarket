<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="style.css">

    <style>

        .cart-page{
            max-width:1100px;
            margin:40px auto;
            padding:20px;
        }

        .cart-page h1{
            text-align:center;
            margin-bottom:30px;
        }

        .cart-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#fff;
            margin-bottom:20px;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,.1);
        }

        .cart-left{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .cart-left img{
            width:100px;
            height:100px;
            object-fit:cover;
            border-radius:10px;
        }

        .cart-right{
            text-align:right;
        }

        .qty-btn{
            padding:8px 14px;
            margin:5px;
            border:none;
            cursor:pointer;
            border-radius:6px;
            background:#2E7D32;
            color:white;
            font-size:16px;
        }

        .remove-btn{
            margin-top:10px;
            background:red;
            color:white;
            border:none;
            padding:8px 18px;
            border-radius:6px;
            cursor:pointer;
        }

        .total-box{
            background:white;
            padding:25px;
            border-radius:10px;
            text-align:center;
            margin-top:30px;
            box-shadow:0 3px 10px rgba(0,0,0,.1);
        }

        .checkout-btn{
            margin-top:20px;
            padding:15px 40px;
            border:none;
            background:#2E7D32;
            color:white;
            cursor:pointer;
            border-radius:8px;
            font-size:18px;
        }

        .empty{
            text-align:center;
            margin-top:80px;
            font-size:25px;
        }

    </style>

</head>
<body>

<header>

<nav>

<div class="logo">
🛒 Smart Supermarket
</div>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="cart.html">Cart</a></li>

</ul>

</nav>

</header>

<div class="cart-page">

<h1>Your Shopping Cart</h1>

<div id="cart-items"></div>

<div class="total-box">

<h2 id="total">Total : ₹0</h2>

<button class="checkout-btn"
onclick="checkout()">
Proceed To Payment
</button>

</div>

</div>

<script src="cart.js"></script>

</body>
</html>
